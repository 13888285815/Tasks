<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能客服 - 管理后台</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-light: #eff6ff;
      --sidebar: #1e293b;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
      --card-bg: #fff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      width: 220px;
      background: var(--sidebar);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
    }

    .sidebar-logo {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-logo h1 {
      font-size: 16px;
      font-weight: 700;
    }

    .sidebar-logo p {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 4px;
    }

    .nav {
      flex: 1;
      padding: 12px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      opacity: 0.75;
      border-left: 3px solid transparent;
    }

    .nav-item:hover { opacity: 1; background: rgba(255,255,255,0.05); }
    .nav-item.active {
      opacity: 1;
      background: rgba(37, 99, 235, 0.3);
      border-left-color: #2563eb;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .go-chat {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      text-decoration: none;
      color: #fff;
    }

    .go-chat:hover { background: rgba(255,255,255,0.2); }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: #fca5a5;
      transition: all 0.2s;
      width: 100%;
      margin-top: 8px;
    }

    .logout-btn:hover { background: rgba(239,68,68,0.25); }

    /* ===== 主内容 ===== */
    .main {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== 顶部栏 ===== */
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar h2 { font-size: 18px; font-weight: 600; }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-live {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: #ecfdf5;
      border: 1px solid #6ee7b7;
      border-radius: 20px;
      font-size: 12px;
      color: #065f46;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .btn-refresh {
      padding: 7px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn-refresh:hover { background: #1d4ed8; }

    /* ===== 内容区 ===== */
    .content {
      padding: 24px 28px;
      flex: 1;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ===== KPI 卡片 ===== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: box-shadow 0.2s;
    }

    .kpi-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

    .kpi-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .kpi-label { font-size: 13px; color: var(--text-muted); }
    .kpi-value { font-size: 28px; font-weight: 700; }
    .kpi-change { font-size: 12px; }
    .kpi-change.up { color: var(--success); }
    .kpi-change.down { color: var(--danger); }

    /* ===== 图表网格 ===== */
    .chart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    canvas { max-height: 220px; }

    /* ===== 意图分布 ===== */
    .intent-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .intent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .intent-color {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .intent-bar-wrap {
      flex: 1;
      background: #f1f5f9;
      border-radius: 4px;
      height: 6px;
    }

    .intent-bar { height: 6px; border-radius: 4px; transition: width 1s ease; }
    .intent-count { font-weight: 600; color: var(--text-muted); min-width: 24px; text-align: right; }

    /* ===== 评分分布 ===== */
    .rating-dist {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .rating-star { width: 24px; }
    .rating-bar-wrap { flex: 1; background: #f1f5f9; border-radius: 4px; height: 8px; }
    .rating-bar { height: 8px; border-radius: 4px; background: var(--warning); transition: width 1s ease; }
    .rating-num { min-width: 28px; text-align: right; color: var(--text-muted); }

    /* ===== 在线客服 ===== */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .agent-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .agent-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .agent-name { font-weight: 600; font-size: 14px; }
    .agent-specialty { font-size: 12px; color: var(--text-muted); }

    .agent-status {
      margin-left: auto;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-online { background: #ecfdf5; color: #065f46; }
    .status-busy { background: #fef3c7; color: #92400e; }
    .status-offline { background: #f1f5f9; color: #64748b; }

    /* ===== 对话列表 ===== */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-select, .filter-input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .filter-select:focus, .filter-input:focus { border-color: var(--primary); }

    .btn-filter {
      padding: 8px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: #f8fafc;
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #f8fafc; }
    td { padding: 12px 14px; }

    .status-badge {
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-active { background: #dbeafe; color: #1e40af; }
    .status-resolved { background: #dcfce7; color: #166534; }
    .status-human { background: #fef3c7; color: #92400e; }
    .status-abandoned { background: #fee2e2; color: #991b1b; }

    .intent-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
    }

    .stars-display { color: var(--warning); }

    .btn-view {
      padding: 4px 10px;
      background: var(--primary-light);
      color: var(--primary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .btn-view:hover { background: #bfdbfe; }

    /* ===== 分页 ===== */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
    }

    .page-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ===== 对话详情弹窗 ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h3 { font-size: 16px; }

    .modal-close {
      width: 28px; height: 28px;
      border: none;
      background: #f1f5f9;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

    .conv-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-item { font-size: 13px; color: var(--text-muted); }
    .meta-item strong { color: var(--text); }

    .msg-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-item {
      display: flex;
      gap: 8px;
      font-size: 13px;
    }

    .msg-item.user { flex-direction: row-reverse; }

    .msg-content {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .msg-content.bot { background: #f1f5f9; }
    .msg-content.user { background: var(--primary); color: #fff; }
    .msg-content.system { background: #fef3c7; font-size: 12px; }

    .msg-ts { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ===== 响应式 ===== */
    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
      .agent-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
  <div class="sidebar-logo">
    <h1>🤖 客服后台</h1>
    <p>智能客服管理系统</p>
  </div>
  <nav class="nav">
    <div class="nav-item active" onclick="showPage('dashboard', this)">
      <span>📊</span><span>数据总览</span>
    </div>
    <div class="nav-item" onclick="showPage('conversations', this)">
      <span>💬</span><span>对话记录</span>
    </div>
    <div class="nav-item" onclick="showPage('agents', this)">
      <span>👨‍💼</span><span>客服团队</span>
    </div>
    <div class="nav-item" onclick="showPage('faq', this)">
      <span>📚</span><span>FAQ 知识库</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:6px">当前登录</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.85);font-weight:500" id="adminName">管理员</div>
    <a href="/" class="go-chat" style="margin-top:10px">
      <span>💬</span><span>进入客服聊天</span>
    </a>
    <button class="logout-btn" onclick="handleLogout()">
      <span>🚪</span><span>退出登录</span>
    </button>
  </div>
</div>

<!-- 主内容 -->
<div class="main">
  <!-- 顶部栏 -->
  <div class="topbar">
    <h2 id="pageTitle">数据总览</h2>
    <div class="topbar-actions">
      <div class="badge-live">
        <div class="live-dot"></div>
        <span>实时数据</span>
      </div>
      <button class="btn-refresh" onclick="refreshData()">🔄 刷新</button>
    </div>
  </div>

  <div class="content">

    <!-- ===== 数据总览页 ===== -->
    <div class="page active" id="page-dashboard">

      <!-- KPI 卡片 -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-icon" style="background:#eff6ff">💬</div>
          <div class="kpi-label">总对话数</div>
          <div class="kpi-value" id="kpi-total">-</div>
          <div class="kpi-change up" id="kpi-today">今日 -</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon" style="background:#f0fdf4">✅</div>
          <div class="kpi-label">机器人解决率</div>
          <div class="kpi-value" id="kpi-resolve">-</div>
          <div class="kpi-change" id="kpi-resolved-count">已解决 -</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon" style="background:#fefce8">⭐</div>
          <div class="kpi-label">平均满意度</div>
          <div class="kpi-value" id="kpi-rating">-</div>
          <div class="kpi-change" id="kpi-rating-count">评价 - 条</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon" style="background:#fdf4ff">👨‍💼</div>
          <div class="kpi-label">转人工率</div>
          <div class="kpi-value" id="kpi-transfer">-</div>
          <div class="kpi-change" id="kpi-transfer-count">转接 - 次</div>
        </div>
      </div>

      <!-- 图表 -->
      <div class="chart-grid">
        <div class="card">
          <div class="card-title">
            <span>📈 近 7 天对话趋势</span>
          </div>
          <canvas id="trendChart"></canvas>
        </div>
        <div class="card">
          <div class="card-title">
            <span>🎯 意图分布</span>
          </div>
          <div class="intent-list" id="intentList"></div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="card">
          <div class="card-title">
            <span>😊 满意度分布</span>
          </div>
          <div class="rating-dist" id="ratingDist"></div>
        </div>
        <div class="card">
          <div class="card-title">
            <span>📊 今日对话统计</span>
          </div>
          <canvas id="todayChart"></canvas>
        </div>
      </div>
    </div>

    <!-- ===== 对话记录页 ===== -->
    <div class="page" id="page-conversations">
      <div class="card">
        <div class="filters">
          <select class="filter-select" id="filterStatus">
            <option value="">所有状态</option>
            <option value="active">进行中</option>
            <option value="resolved">已解决</option>
            <option value="human">转人工</option>
            <option value="abandoned">已放弃</option>
          </select>
          <select class="filter-select" id="filterIntent">
            <option value="">所有意图</option>
            <option value="refund">退款</option>
            <option value="order">订单</option>
            <option value="technical">技术支持</option>
            <option value="other">其他</option>
          </select>
          <input type="date" class="filter-input" id="filterDate" />
          <button class="btn-filter" onclick="loadConversations(1)">🔍 筛选</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>会话 ID</th>
              <th>用户</th>
              <th>开始时间</th>
              <th>意图</th>
              <th>消息数</th>
              <th>状态</th>
              <th>评分</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="convTableBody">
            <tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:40px">加载中...</td></tr>
          </tbody>
        </table>

        <div class="pagination" id="pagination"></div>
      </div>
    </div>

    <!-- ===== 客服团队页 ===== -->
    <div class="page" id="page-agents">
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">👨‍💼 在线客服状态</div>
        <div class="agent-grid" id="agentGrid">
          <div style="color:#94a3b8;font-size:13px">加载中...</div>
        </div>
      </div>
    </div>

    <!-- ===== FAQ 知识库页 ===== -->
    <div class="page" id="page-faq">
      <div class="card">
        <div class="card-title">📚 FAQ 知识库管理</div>
        <div id="faqList" style="display:flex;flex-direction:column;gap:12px">加载中...</div>
      </div>
    </div>

  </div>
</div>

<!-- 对话详情弹窗 -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>💬 对话详情</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  // ===== 鉴权检查：未登录则跳转到登录页 =====
  (async function checkAuth() {
    try {
      const resp = await fetch('/api/auth/me');
      const data = await resp.json();
      if (data.success && data.admin) {
        document.getElementById('adminName').textContent = data.admin.name || data.admin.username;
      } else {
        location.href = '/login?from=/admin';
      }
    } catch (e) {
      location.href = '/login?from=/admin';
    }
  })();

  // ===== 退出登录 =====
  async function handleLogout() {
    if (!confirm('确定要退出登录吗？')) return;
    try {
      await fetch('/api/auth/logout', { method: 'POST' });
    } catch (e) {}
    location.href = '/login';
  }

  // ===== 所有 admin API 请求统一处理 401 =====
  const _origFetch = window.fetch;
  window.fetch = async function(...args) {
    const resp = await _origFetch(...args);
    if (resp.status === 401) {
      const clone = resp.clone();
      const data = await clone.json().catch(() => ({}));
      if (data.redirect) {
        location.href = data.redirect + '?from=/admin';
        return resp;
      }
    }
    return resp;
  };

  let trendChart = null;
  let todayChart = null;
  let currentPage = 1;

  const INTENT_COLORS = {
    refund: { color: '#ef4444', label: '💰 退款' },
    order: { color: '#2563eb', label: '📦 订单' },
    technical: { color: '#f59e0b', label: '🔧 技术' },
    complaint: { color: '#8b5cf6', label: '😤 投诉' },
    other: { color: '#10b981', label: '📋 其他' }
  };

  const STATUS_MAP = {
    active: { label: '进行中', cls: 'status-active' },
    resolved: { label: '已解决', cls: 'status-resolved' },
    human: { label: '转人工', cls: 'status-human' },
    abandoned: { label: '已放弃', cls: 'status-abandoned' }
  };

  // ===== 页面切换 =====
  function showPage(name, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    if (el) el.classList.add('active');

    const titles = { dashboard: '数据总览', conversations: '对话记录', agents: '客服团队', faq: 'FAQ 知识库' };
    document.getElementById('pageTitle').textContent = titles[name] || name;

    if (name === 'conversations') loadConversations(1);
    if (name === 'agents') loadAgents();
    if (name === 'faq') loadFAQ();
  }

  // ===== 加载统计数据 =====
  async function loadStats() {
    try {
      const resp = await fetch('/api/admin/stats');
      const data = await resp.json();
      if (!data.success) return;

      const s = data.stats;
      const total = s.totalConversations || 0;
      const resolved = s.resolvedByBot || 0;
      const transferred = s.transferredToHuman || 0;
      const resolveRate = total > 0 ? ((resolved / total) * 100).toFixed(1) : 0;
      const transferRate = total > 0 ? ((transferred / total) * 100).toFixed(1) : 0;

      // KPI
      const today = new Date().toISOString().slice(0, 10);
      const todayData = s.dailyStats?.[today] || {};
      document.getElementById('kpi-total').textContent = total;
      document.getElementById('kpi-today').textContent = `今日 ${todayData.conversations || 0} 次`;
      document.getElementById('kpi-resolve').textContent = resolveRate + '%';
      document.getElementById('kpi-resolved-count').textContent = `已解决 ${resolved} 次`;
      document.getElementById('kpi-rating').textContent = s.avgRating > 0 ? '⭐ ' + s.avgRating : '-';
      document.getElementById('kpi-rating-count').textContent = `评价 ${s.ratingCount || 0} 条`;
      document.getElementById('kpi-transfer').textContent = transferRate + '%';
      document.getElementById('kpi-transfer-count').textContent = `转接 ${transferred} 次`;

      // 趋势图
      renderTrendChart(s.last7Days || []);

      // 意图分布
      renderIntentList(s.intentStats || {});

      // 评分分布
      renderRatingDist(s.ratings || {});

      // 今日图
      renderTodayChart(todayData);

    } catch (e) {
      console.error('加载统计失败:', e);
    }
  }

  function renderTrendChart(days) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    if (trendChart) trendChart.destroy();

    const labels = days.map(d => d.date.slice(5));
    const convData = days.map(d => d.conversations || 0);
    const resolveData = days.map(d => d.resolved || 0);

    trendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '总对话',
            data: convData,
            borderColor: '#2563eb',
            backgroundColor: 'rgba(37,99,235,0.08)',
            tension: 0.4,
            fill: true,
            pointRadius: 4,
            pointBackgroundColor: '#2563eb'
          },
          {
            label: '已解决',
            data: resolveData,
            borderColor: '#10b981',
            backgroundColor: 'rgba(16,185,129,0.08)',
            tension: 0.4,
            fill: true,
            pointRadius: 4,
            pointBackgroundColor: '#10b981'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { position: 'top', labels: { font: { size: 12 }, usePointStyle: true } } },
        scales: {
          y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { stepSize: 1 } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderIntentList(intentStats) {
    const list = document.getElementById('intentList');
    const total = Object.values(intentStats).reduce((a, b) => a + b, 0) || 1;

    const items = Object.entries(INTENT_COLORS).map(([key, cfg]) => {
      const count = intentStats[key] || 0;
      const pct = Math.round((count / total) * 100);
      return `
        <div class="intent-item">
          <div class="intent-color" style="background:${cfg.color}"></div>
          <span style="min-width:60px;font-size:12px">${cfg.label}</span>
          <div class="intent-bar-wrap">
            <div class="intent-bar" style="width:${pct}%;background:${cfg.color}"></div>
          </div>
          <span class="intent-count">${count}</span>
        </div>
      `;
    });

    list.innerHTML = items.join('') || '<div style="color:#94a3b8;font-size:13px;text-align:center;padding:20px">暂无数据</div>';
  }

  function renderRatingDist(ratings) {
    const container = document.getElementById('ratingDist');
    const total = Object.values(ratings).reduce((a, b) => a + b, 0) || 1;
    const emojis = { 5: '🤩', 4: '😊', 3: '🙂', 2: '😐', 1: '😞' };

    const rows = [5, 4, 3, 2, 1].map(s => {
      const count = ratings[s] || 0;
      const pct = Math.round((count / total) * 100);
      return `
        <div class="rating-row">
          <span class="rating-star">${emojis[s]}</span>
          <span style="width:20px;font-size:12px;color:#64748b">${s}★</span>
          <div class="rating-bar-wrap">
            <div class="rating-bar" style="width:${pct}%"></div>
          </div>
          <span class="rating-num">${count}</span>
        </div>
      `;
    });

    container.innerHTML = rows.join('');
  }

  function renderTodayChart(todayData) {
    const ctx = document.getElementById('todayChart').getContext('2d');
    if (todayChart) todayChart.destroy();

    const resolved = todayData.resolved || 0;
    const transferred = todayData.transferred || 0;
    const total = todayData.conversations || 0;
    const active = Math.max(0, total - resolved - transferred);

    todayChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['已解决', '转人工', '进行中'],
        datasets: [{
          data: [resolved, transferred, active],
          backgroundColor: ['#10b981', '#f59e0b', '#2563eb'],
          borderWidth: 0,
          hoverOffset: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 12 }, usePointStyle: true, padding: 16 } }
        },
        cutout: '65%'
      }
    });
  }

  // ===== 加载对话列表 =====
  async function loadConversations(page = 1) {
    currentPage = page;
    const status = document.getElementById('filterStatus').value;
    const intent = document.getElementById('filterIntent').value;
    const date = document.getElementById('filterDate').value;

    let url = `/api/admin/conversations?page=${page}&limit=15`;
    if (status) url += `&status=${status}`;
    if (intent) url += `&intent=${intent}`;
    if (date) url += `&date=${date}`;

    try {
      const resp = await fetch(url);
      const data = await resp.json();
      if (!data.success) return;

      renderConvTable(data.items);
      renderPagination(data.page, data.pages);
    } catch (e) {
      console.error('加载对话失败:', e);
    }
  }

  function renderConvTable(items) {
    const tbody = document.getElementById('convTableBody');

    if (!items || items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:40px">暂无对话记录</td></tr>';
      return;
    }

    tbody.innerHTML = items.map(c => {
      const statusInfo = STATUS_MAP[c.status] || { label: c.status, cls: 'status-active' };
      const intentInfo = INTENT_COLORS[c.intent] || null;
      const intentBadge = intentInfo
        ? `<span class="intent-tag" style="background:${intentInfo.color}20;color:${intentInfo.color}">${intentInfo.label}</span>`
        : '<span style="color:#94a3b8">-</span>';

      const stars = c.rating ? '⭐'.repeat(c.rating) : '-';
      const startTime = new Date(c.startTime).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });

      return `
        <tr>
          <td style="font-family:monospace;font-size:11px;color:#64748b">${c.id.slice(-8)}</td>
          <td>${c.userId || '-'}</td>
          <td>${startTime}</td>
          <td>${intentBadge}</td>
          <td><span style="font-weight:600">${c.messageCount || 0}</span></td>
          <td><span class="status-badge ${statusInfo.cls}">${statusInfo.label}</span></td>
          <td class="stars-display" style="font-size:13px">${stars}</td>
          <td><button class="btn-view" onclick="viewConversation('${c.id}')">查看</button></td>
        </tr>
      `;
    }).join('');
  }

  function renderPagination(current, total) {
    const container = document.getElementById('pagination');
    if (total <= 1) { container.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="loadConversations(${Math.max(1, current-1)})" ${current===1?'disabled':''}>‹</button>`;

    for (let i = 1; i <= total; i++) {
      if (i === 1 || i === total || Math.abs(i - current) <= 2) {
        html += `<button class="page-btn ${i===current?'active':''}" onclick="loadConversations(${i})">${i}</button>`;
      } else if (Math.abs(i - current) === 3) {
        html += '<span style="color:#94a3b8">...</span>';
      }
    }

    html += `<button class="page-btn" onclick="loadConversations(${Math.min(total, current+1)})" ${current===total?'disabled':''}>›</button>`;
    container.innerHTML = html;
  }

  // ===== 查看对话详情 =====
  async function viewConversation(id) {
    try {
      const resp = await fetch('/api/admin/conversations/' + id);
      const data = await resp.json();
      if (!data.success) return;

      const c = data.conversation;
      const startTime = new Date(c.startTime).toLocaleString('zh-CN');
      const endTime = c.endTime ? new Date(c.endTime).toLocaleString('zh-CN') : '进行中';
      const statusInfo = STATUS_MAP[c.status] || { label: c.status };
      const intentInfo = INTENT_COLORS[c.intent] || null;

      const metaHtml = `
        <div class="conv-meta">
          <div class="meta-item">会话ID：<strong>${c.id.slice(-8)}</strong></div>
          <div class="meta-item">用户：<strong>${c.userId || '-'}</strong></div>
          <div class="meta-item">开始：<strong>${startTime}</strong></div>
          <div class="meta-item">结束：<strong>${endTime}</strong></div>
          <div class="meta-item">状态：<strong>${statusInfo.label}</strong></div>
          <div class="meta-item">意图：<strong>${intentInfo ? intentInfo.label : '-'}</strong></div>
          <div class="meta-item">消息数：<strong>${c.messages.length}</strong></div>
          <div class="meta-item">评分：<strong>${c.rating ? '⭐'.repeat(c.rating) + ` (${c.rating}星)` : '未评价'}</strong></div>
        </div>
      `;

      const msgsHtml = c.messages.map(m => {
        const ts = new Date(m.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const isUser = m.role === 'user';
        return `
          <div class="msg-item ${m.role}">
            <div>
              <div class="msg-content ${m.role}">${m.content}</div>
              <div class="msg-ts ${isUser ? 'style="text-align:right"' : ''}">${ts}</div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('modalBody').innerHTML = metaHtml + `<div class="msg-list">${msgsHtml}</div>`;
      document.getElementById('modalOverlay').style.display = 'flex';
    } catch (e) {
      console.error('加载对话详情失败:', e);
    }
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay') || e.type === 'click') {
      document.getElementById('modalOverlay').style.display = 'none';
    }
  }

  // ===== 加载客服团队 =====
  async function loadAgents() {
    try {
      const resp = await fetch('/api/admin/agents');
      const data = await resp.json();
      if (!data.success) return;

      const grid = document.getElementById('agentGrid');
      const statusClass = { online: 'status-online', busy: 'status-busy', offline: 'status-offline' };
      const statusLabel = { online: '🟢 在线', busy: '🟡 忙碌', offline: '⚫ 离线' };

      grid.innerHTML = data.agents.map(a => `
        <div class="agent-card">
          <div class="agent-avatar">👤</div>
          <div>
            <div class="agent-name">${a.name}</div>
            <div class="agent-specialty">${a.specialty}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">当前服务：${a.currentLoad} 人</div>
          </div>
          <span class="agent-status ${statusClass[a.status] || 'status-offline'}">${statusLabel[a.status] || '未知'}</span>
        </div>
      `).join('');
    } catch (e) { console.error('加载客服失败:', e); }
  }

  // ===== 加载 FAQ =====
  async function loadFAQ() {
    try {
      const resp = await fetch('/api/admin/faq');
      const data = await resp.json();
      if (!data.success) return;

      const container = document.getElementById('faqList');
      container.innerHTML = data.faqs.map((faq, idx) => `
        <div style="border:1px solid #e2e8f0;border-radius:10px;padding:14px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="background:${INTENT_COLORS[faq.intent]?.color || '#666'}20;color:${INTENT_COLORS[faq.intent]?.color || '#666'};padding:2px 8px;border-radius:4px;font-size:12px">${INTENT_COLORS[faq.intent]?.label || faq.intent}</span>
            <strong style="font-size:14px">${faq.question}</strong>
          </div>
          <div style="font-size:13px;color:#64748b;line-height:1.6;white-space:pre-wrap">${faq.answer}</div>
          <div style="margin-top:8px;font-size:11px;color:#94a3b8">
            关键词：${faq.keywords.join('、')}
          </div>
        </div>
      `).join('');
    } catch (e) { console.error('加载FAQ失败:', e); }
  }

  // ===== 刷新数据 =====
  function refreshData() {
    const activePage = document.querySelector('.page.active');
    if (activePage?.id === 'page-dashboard') loadStats();
    else if (activePage?.id === 'page-conversations') loadConversations(currentPage);
    else if (activePage?.id === 'page-agents') loadAgents();
    else if (activePage?.id === 'page-faq') loadFAQ();
  }

  // ===== 初始化 =====
  loadStats();
  setInterval(loadStats, 30000); // 每30秒自动刷新
</script>
</body>
</html>
