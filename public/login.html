<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 · 登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e1b4b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* 背景装饰 */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 60% 40%, rgba(37,99,235,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 80%, rgba(79,70,229,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.4);
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .logo p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    input::placeholder { color: rgba(255,255,255,0.3); }

    input:focus {
      border-color: rgba(37,99,235,0.7);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }

    /* 显示/隐藏密码按钮 */
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: rgba(255,255,255,0.8); }

    /* 错误提示 */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .error-msg.show { display: flex; }

    /* 登录按钮 */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(37,99,235,0.4);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.5);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .footer-link {
      text-align: center;
      margin-top: 20px;
    }

    .footer-link a {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-link a:hover { color: rgba(255,255,255,0.8); }

    /* 成功动画 */
    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.95); }
    }

    .success-anim {
      animation: fadeOut 0.3s ease forwards;
    }

    /* 输入框抖动 */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .shake { animation: shake 0.3s ease; }
  </style>
</head>
<body>

<div class="card" id="loginCard">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <h1>智能客服管理后台</h1>
    <p>请使用管理员账号登录</p>
  </div>

  <div class="error-msg" id="errorMsg">
    <span>⚠️</span>
    <span id="errorText">用户名或密码错误</span>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="username">用户名</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input
          type="text"
          id="username"
          placeholder="请输入管理员用户名"
          autocomplete="username"
          autofocus
        />
      </div>
    </div>

    <div class="form-group">
      <label for="password">密码</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input
          type="password"
          id="password"
          placeholder="请输入密码"
          autocomplete="current-password"
        />
        <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn">👁</button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">🔐 登录管理后台</span>
    </button>
  </form>

  <div class="divider">或</div>

  <div class="footer-link">
    <a href="/">← 返回客服聊天界面</a>
  </div>
</div>

<script>
  // 检查是否已登录
  fetch('/api/auth/me')
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        const from = new URLSearchParams(location.search).get('from') || '/admin';
        location.href = from;
      }
    })
    .catch(() => {});

  async function handleLogin(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');

    if (!username || !password) {
      showError('请输入用户名和密码');
      return;
    }

    // 加载状态
    loginBtn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = '登录中...';
    errorMsg.classList.remove('show');

    try {
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await resp.json();

      if (data.success) {
        // 成功 - 跳转
        btnText.textContent = `✅ 欢迎，${data.name}！`;
        spinner.style.display = 'none';
        document.getElementById('loginCard').classList.add('success-anim');
        setTimeout(() => {
          const from = new URLSearchParams(location.search).get('from') || '/admin';
          location.href = from;
        }, 400);
      } else {
        showError(data.error || '用户名或密码错误');
        // 抖动效果
        document.getElementById('loginForm').classList.add('shake');
        setTimeout(() => document.getElementById('loginForm').classList.remove('shake'), 300);
      }
    } catch (err) {
      showError('网络异常，请稍后重试');
    } finally {
      if (!document.getElementById('loginBtn').disabled || true) {
        loginBtn.disabled = false;
        spinner.style.display = 'none';
        if (btnText.textContent === '登录中...') {
          btnText.textContent = '🔐 登录管理后台';
        }
      }
    }
  }

  function showError(msg) {
    const errorMsg = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    errorMsg.classList.add('show');
    const loginBtn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    loginBtn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = '🔐 登录管理后台';
  }

  function togglePassword() {
    const pw = document.getElementById('password');
    const btn = document.getElementById('toggleBtn');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
    } else {
      pw.type = 'password';
      btn.textContent = '👁';
    }
  }

  // Enter 键提交
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin(e);
  });
</script>
</body>
</html>
