<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能客服 - 在线咨询</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #eff6ff;
      --bot-bg: #f1f5f9;
      --user-bg: #2563eb;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 420px;
      height: 90vh;
      max-height: 760px;
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ===== 头部 ===== */
    .chat-header {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-info .status {
      font-size: 12px;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .header-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-btn:hover { background: rgba(255,255,255,0.25); }

    /* ===== 快捷问题标签 ===== */
    .quick-tags {
      padding: 10px 16px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .quick-tags::-webkit-scrollbar { display: none; }

    .tag {
      white-space: nowrap;
      padding: 5px 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .tag:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ===== 消息区域 ===== */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    /* 消息行 */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .msg-avatar.bot { background: linear-gradient(135deg, #2563eb, #4f46e5); }
    .msg-avatar.user { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .msg-avatar.agent { background: linear-gradient(135deg, #10b981, #059669); }

    .msg-body { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .msg-body { align-items: flex-end; }

    .msg-name {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      position: relative;
    }

    .bubble.bot {
      background: var(--bot-bg);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.agent {
      background: #ecfdf5;
      color: var(--text);
      border: 1px solid #bbf7d0;
      border-bottom-left-radius: 4px;
    }

    .bubble.system {
      background: #fef3c7;
      color: #92400e;
      font-size: 12px;
      border-radius: 8px;
      text-align: center;
      padding: 6px 12px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* Markdown 格式 */
    .bubble strong { font-weight: 600; }
    .bubble ul, .bubble ol { padding-left: 16px; }
    .bubble li { margin: 2px 0; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

    /* ===== 打字中动画 ===== */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeInUp 0.3s ease;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      background: var(--bot-bg);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ===== 评分卡片 ===== */
    .rating-card {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .rating-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .star {
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.2s;
      filter: grayscale(1);
    }

    .star:hover, .star.active {
      filter: grayscale(0);
      transform: scale(1.2);
    }

    /* ===== 转人工卡片 ===== */
    .transfer-card {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border: 1px solid #6ee7b7;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }

    .transfer-card .agent-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .transfer-card .agent-info { flex: 1; }
    .transfer-card .agent-name { font-size: 13px; font-weight: 600; color: #065f46; }
    .transfer-card .agent-desc { font-size: 11px; color: #6ee7b7; color: #059669; }

    /* ===== 输入区域 ===== */
    .input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    textarea {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 42px;
      transition: border-color 0.2s;
      color: var(--text);
      line-height: 1.5;
    }

    textarea:focus { border-color: var(--primary); }
    textarea::placeholder { color: #94a3b8; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
    .send-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ===== 会话信息栏 ===== */
    .session-bar {
      padding: 8px 16px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    .intent-badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .intent-refund { background: #fee2e2; color: #991b1b; }
    .intent-order { background: #dbeafe; color: #1e40af; }
    .intent-technical { background: #fef3c7; color: #92400e; }
    .intent-other { background: #f3e8ff; color: #6b21a8; }
    .intent-unknown { background: #f1f5f9; color: #64748b; }

    /* ===== 浮动操作 ===== */
    .float-actions {
      position: absolute;
      bottom: 80px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fab {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: all 0.2s;
    }

    .fab:hover { transform: scale(1.1); }
    .fab-transfer { background: #10b981; color: #fff; }
    .fab-scroll { background: #fff; color: var(--text); border: 1px solid var(--border); }

    /* ===== 响应式 ===== */
    @media (max-width: 480px) {
      body { align-items: flex-end; }
      .chat-container {
        width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
<div class="chat-container">
  <!-- 头部 -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h2>智能客服小智</h2>
      <div class="status">
        <div class="status-dot"></div>
        <span id="statusText">在线 · 随时为您服务</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" title="新对话" onclick="startNewChat()">🔄</button>
      <a href="/admin" class="header-btn" title="管理后台" style="text-decoration:none">⚙️</a>
    </div>
  </div>

  <!-- 会话信息栏 -->
  <div class="session-bar">
    <span id="sessionInfo">连接中...</span>
    <span id="intentBadge" class="intent-badge intent-unknown">识别意图中</span>
  </div>

  <!-- 快捷问题 -->
  <div class="quick-tags" id="quickTags">
    <div class="tag" onclick="sendQuick('我要申请退款')">💰 申请退款</div>
    <div class="tag" onclick="sendQuick('查询我的订单')">📦 查询订单</div>
    <div class="tag" onclick="sendQuick('我无法登录账号')">🔧 登录问题</div>
    <div class="tag" onclick="sendQuick('支付失败怎么办')">💳 支付失败</div>
    <div class="tag" onclick="sendQuick('我要申请开发票')">📄 申请发票</div>
    <div class="tag" onclick="sendQuick('转接人工客服')">👨‍💼 转人工</div>
  </div>

  <!-- 消息区域 -->
  <div class="messages" id="messages"></div>

  <!-- 浮动按钮 -->
  <div class="float-actions">
    <button class="fab fab-transfer" title="转人工客服" onclick="sendQuick('转接人工客服')">👨‍💼</button>
    <button class="fab fab-scroll" title="滚动到底部" onclick="scrollToBottom()" id="scrollBtn" style="display:none">↓</button>
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="inputText"
        placeholder="请描述您的问题..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
        maxlength="500"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">按 Enter 发送 · Shift+Enter 换行 · <span id="charCount">0</span>/500</div>
  </div>
</div>

<script>
  let sessionId = null;
  let isWaiting = false;
  let currentIntent = 'unknown';

  const INTENT_LABELS = {
    refund: { label: '💰 退款问题', cls: 'intent-refund' },
    order: { label: '📦 订单查询', cls: 'intent-order' },
    technical: { label: '🔧 技术支持', cls: 'intent-technical' },
    other: { label: '📋 其他咨询', cls: 'intent-other' },
    complaint: { label: '😤 投诉建议', cls: 'intent-other' },
    unknown: { label: '💬 识别意图中', cls: 'intent-unknown' }
  };

  // ===== 初始化 =====
  async function init() {
    try {
      const resp = await fetch('/api/chat/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });
      const data = await resp.json();
      if (data.success) {
        sessionId = data.sessionId;
        document.getElementById('sessionInfo').textContent = `会话 #${sessionId.slice(-8)}`;
        appendMessage('bot', data.message);
      }
    } catch (e) {
      appendSystemMessage('连接服务器失败，请刷新页面重试');
    }
  }

  // ===== 发送消息 =====
  async function sendMessage() {
    const input = document.getElementById('inputText');
    const text = input.value.trim();
    if (!text || isWaiting || !sessionId) return;

    input.value = '';
    autoResize(input);
    document.getElementById('charCount').textContent = '0';
    appendMessage('user', text);
    setWaiting(true);

    try {
      const resp = await fetch('/api/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text })
      });
      const data = await resp.json();

      if (data.success) {
        // 更新意图标签
        if (data.intent && data.intent !== 'unknown') {
          currentIntent = data.intent;
          updateIntentBadge(data.intent);
        }

        if (data.type === 'transfer') {
          appendMessage('bot', data.message);
          if (data.agent) {
            appendTransferCard(data.agent);
          }
          updateStatusText('已转接人工客服');
        } else if (data.type === 'human') {
          appendSystemMessage(data.message);
        } else {
          appendMessage('bot', data.message);
          // 如果解决了问题，显示评分
          if (data.message.includes('是否解决了您的问题')) {
            setTimeout(() => appendRatingCard(), 500);
          }
        }
      } else {
        appendMessage('bot', '抱歉，处理您的消息时出现了问题，请稍后重试。');
      }
    } catch (e) {
      appendMessage('bot', '网络异常，请检查连接后重试 😅');
    }

    setWaiting(false);
  }

  // ===== 快捷发送 =====
  function sendQuick(text) {
    document.getElementById('inputText').value = text;
    sendMessage();
  }

  // ===== 添加消息 =====
  function appendMessage(role, content) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatarMap = { bot: '🤖', user: '👤', agent: '👨‍💼' };
    const nameMap = { bot: '小智', user: '您', agent: '人工客服' };

    const isUser = role === 'user';
    const html = `
      <div class="msg-avatar ${role}">${avatarMap[role] || '💬'}</div>
      <div class="msg-body">
        <div class="msg-name">${nameMap[role] || role}</div>
        <div class="bubble ${role}">${formatMarkdown(content)}</div>
        <div class="msg-time">${getTime()}</div>
      </div>
    `;
    row.innerHTML = html;
    msgs.appendChild(row);
    scrollToBottom();
  }

  function appendSystemMessage(text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.innerHTML = `<div class="bubble system">📢 ${text}</div>`;
    div.style.animation = 'fadeInUp 0.3s ease';
    msgs.appendChild(div);
    scrollToBottom();
  }

  function appendTransferCard(agent) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.style.animation = 'fadeInUp 0.3s ease';
    div.innerHTML = `
      <div class="transfer-card">
        <div class="agent-icon">👨‍💼</div>
        <div class="agent-info">
          <div class="agent-name">客服 ${agent.name}</div>
          <div class="agent-desc">专长：${agent.specialty} · 正在接入中...</div>
        </div>
        <span style="font-size:18px;animation:pulse 1s infinite">🟢</span>
      </div>
    `;
    msgs.appendChild(div);
    scrollToBottom();
  }

  function appendRatingCard() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.style.animation = 'fadeInUp 0.3s ease';
    div.innerHTML = `
      <div class="rating-card">
        <p>您对本次服务满意吗？您的反馈对我们很重要 😊</p>
        <div class="stars">
          <span class="star" onclick="submitRating(1, this)">😞</span>
          <span class="star" onclick="submitRating(2, this)">😐</span>
          <span class="star" onclick="submitRating(3, this)">🙂</span>
          <span class="star" onclick="submitRating(4, this)">😊</span>
          <span class="star" onclick="submitRating(5, this)">🤩</span>
        </div>
      </div>
    `;
    msgs.appendChild(div);
    scrollToBottom();
  }

  // ===== 提交评分 =====
  async function submitRating(rating, el) {
    if (!sessionId) return;
    el.parentElement.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('active', i < rating);
    });
    el.parentElement.parentElement.querySelector('p').textContent = '感谢您的评价！';

    try {
      const resp = await fetch('/api/chat/rate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, rating })
      });
      const data = await resp.json();
      if (data.success) {
        setTimeout(() => appendSystemMessage(data.message), 300);
      }
    } catch (e) {}
  }

  // ===== 工具函数 =====
  function setWaiting(val) {
    isWaiting = val;
    document.getElementById('sendBtn').disabled = val;
    document.getElementById('inputText').disabled = val;

    const msgs = document.getElementById('messages');
    const existingIndicator = msgs.querySelector('.typing-indicator');

    if (val && !existingIndicator) {
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = `
        <div class="msg-avatar bot">🤖</div>
        <div class="typing-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      `;
      msgs.appendChild(indicator);
      scrollToBottom();
    } else if (!val && existingIndicator) {
      existingIndicator.remove();
    }
  }

  function formatMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>')
      .replace(/• /g, '• ')
      .replace(/(\d+)\. /g, '$1. ');
  }

  function getTime() {
    const now = new Date();
    return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function updateIntentBadge(intent) {
    const badge = document.getElementById('intentBadge');
    const info = INTENT_LABELS[intent] || INTENT_LABELS.unknown;
    badge.textContent = info.label;
    badge.className = `intent-badge ${info.cls}`;
  }

  function updateStatusText(text) {
    document.getElementById('statusText').textContent = text;
    document.querySelector('.status-dot').style.background = '#f59e0b';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    document.getElementById('charCount').textContent = el.value.length;
  }

  async function startNewChat() {
    if (!confirm('确定要开始新对话吗？当前对话将结束。')) return;
    if (sessionId) {
      await fetch('/api/chat/end', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId })
      });
    }
    document.getElementById('messages').innerHTML = '';
    sessionId = null;
    currentIntent = 'unknown';
    updateIntentBadge('unknown');
    document.getElementById('statusText').textContent = '在线 · 随时为您服务';
    document.querySelector('.status-dot').style.background = '#4ade80';
    await init();
  }

  // 滚动检测
  document.getElementById('messages').addEventListener('scroll', function() {
    const scrollBtn = document.getElementById('scrollBtn');
    const isNearBottom = this.scrollHeight - this.scrollTop - this.clientHeight < 100;
    scrollBtn.style.display = isNearBottom ? 'none' : 'flex';
  });

  // 启动
  init();
</script>
</body>
</html>
